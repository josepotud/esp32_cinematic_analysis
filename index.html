<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador de Movimiento Cinemático</title>
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <style>
        :root {
            --bg-primary: #ffffff; --bg-secondary: #f8fafc; --card-bg: #ffffff;
            --text-main: #0f172a; --text-muted: #64748b; --border: #e2e8f0;
            --accent: #2563eb; --success: #16a34a; --warning: #ca8a04;
            --danger: #dc2626; --console-bg: #1e293b; --console-text: #f1f5f9;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #020617; --bg-secondary: #0f172a; --card-bg: #1e293b;
                --text-main: #f1f5f9; --text-muted: #94a3b8; --border: #334155; --accent: #3b82f6;
            }
        }

        body { font-family: 'Inter', -apple-system, system-ui, sans-serif; background-color: var(--bg-primary); color: var(--text-main); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 12px 24px; background: var(--card-bg); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; z-index: 10; }
        .brand { flex: 1 1 auto; min-width: 200px; }
        .brand h1 { font-size: 1rem; margin: 0; font-weight: 800; text-transform: uppercase; letter-spacing: 0.02em; line-height: 1.2; white-space: normal; }
        .controls { display: flex; gap: 8px; flex-wrap: wrap; flex: 0 1 auto; justify-content: flex-end; }
        button { padding: 8px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text-main); font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
        button:hover:not(:disabled) { background: var(--bg-secondary); border-color: var(--accent); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        button.primary { background: var(--accent); color: white; border: none; }
        button.record { background: var(--danger); color: white; border: none; }
        button.record.active { animation: pulse 1.5s infinite; }

        .desktop-only { display: block; } .mobile-only { display: none !important; }


        main { display: grid; grid-template-columns: 320px 1fr; grid-template-rows: auto 1fr; flex: 1; overflow: hidden; }
        aside { grid-row: 1 / 3; background: var(--bg-secondary); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 16px; gap: 16px; overflow-y: auto; }


        .metrics-container { display: flex; flex-direction: column; gap: 16px; }
        .metric-card { background: var(--card-bg); padding: 16px; border-radius: 10px; border: 1px solid var(--border); }
        .metric-label { font-size: 0.7rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        .metric-value { font-size: 1.5rem; font-weight: 700; color: var(--accent); }

        /* Estilos del Panel DSP */
        .settings-panel { background: var(--card-bg); padding: 16px; border-radius: 10px; border: 1px solid var(--border); display: flex; flex-direction: column; gap: 0; }
        .settings-header { font-size: 0.8rem; font-weight: 800; color: var(--text-main); text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
        .settings-content { display: flex; flex-direction: column; gap: 12px; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
        .setting-item { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: var(--text-muted); font-weight: 600; }
        .setting-item input, .setting-item select { width: 75px; padding: 4px; background: var(--bg-secondary); border: 1px solid var(--border); color: var(--text-main); border-radius: 4px; font-family: inherit; text-align: right; outline: none; }
        .toggle-icon { display: none; }

        #console-container { flex: 1; display: flex; flex-direction: column; background: var(--console-bg); border-radius: 8px; overflow: hidden; min-height: 200px; }
        .console-header { padding: 10px 12px; background: #0f172a; color: #94a3b8; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
        .close-console-btn { background: transparent; border: none; color: #f1f5f9; font-size: 1.2rem; padding: 0; line-height: 1; cursor: pointer; }
        #console { padding: 12px; font-family: 'SFMono-Regular', Consolas, monospace; font-size: 0.75rem; color: var(--console-text); overflow-y: auto; flex: 1; line-height: 1.5; }
        
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 2px; }
        .log-time { color: #64748b; margin-right: 8px; }
        .log-info { color: #3b82f6; }
        .log-success { color: #22c55e; }
        .log-error { color: #ef4444; }
        .log-warning { color: var(--warning); }

        .dashboard-content { padding: 16px; display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); gap: 16px; overflow-y: auto; }
        .chart-wrapper { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px; position: relative; min-height: 250px; }
        .full-width { grid-column: span 2; }

        /* --- Modo Móvil --- */
        @media (max-width: 900px) {
            header { justify-content: center; text-align: center; }
            .brand { width: 100%; margin-bottom: 4px; }
            .controls { width: 100%; justify-content: center; }
            .desktop-only { display: none; }
        }

        @media (max-width: 768px) {
            .mobile-only { display: flex !important; }
            main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
            aside { grid-row: auto; height: auto; border-right: none; border-bottom: 1px solid var(--border); padding: 12px; }
            .metrics-container { flex-direction: row; flex-wrap: nowrap; overflow-x: auto; gap: 8px; padding-bottom: 4px; }
            .metric-card { flex: 1; min-width: 110px; padding: 10px; text-align: center; }
            .metric-value { font-size: 1.2rem; }
            
            /* Lógica de plegado de ajustes en móvil */
            .settings-header { cursor: pointer; padding: 8px 0; }
            .toggle-icon { display: inline-block; transition: transform 0.3s; font-size: 0.7rem; }
            .settings-content { display: none; }
            .settings-panel.open .settings-content { display: flex; }
            .settings-panel.open .toggle-icon { transform: rotate(180deg); }

            #console-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; border-radius: 0; z-index: 1000; transform: translateY(100%); transition: transform 0.3s ease-in-out; }
            #console-container.show { transform: translateY(0); }
            
            /* Reordenación de gráficos en móvil */
            .dashboard-content { display: flex; flex-direction: column; padding: 12px; }
            #c-pca { order: 1; }
            #c-fft { order: 2; }
            #c-acc { order: 3; }
            #c-gyro { order: 4; }
            .full-width { grid-column: auto; }
        }
        @media (max-width: 480px) { header { padding: 12px; } .controls { gap: 6px; } button { padding: 8px 10px; font-size: 0.75rem; flex: 1 1 auto; justify-content: center; } }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <h1>Análisis Cinemático</h1>
    </div>
    <div class="controls">
        <button onclick="connectUSB()" class="primary"><span>🔌</span> USB</button>
        <button onclick="connectBLE()"><span>🔵</span> BLE</button>
        <div style="width: 1px; background: var(--border); margin: 0 4px;" class="desktop-only"></div>
        <button id="btn-record" onclick="startRecording()" class="record"><span>🔴</span> Grabar</button>
        <button id="btn-stop" onclick="stopRecording()" disabled><span>⏹️</span> Stop</button>
        <button onclick="toggleConsole()" class="mobile-only" style="background: var(--console-bg); color: white; border: none;"><span>📜</span> Consola</button>
    </div>
</header>

<main>
    <aside>
        <div class="metrics-container">
            <div class="metric-card">
                <div class="metric-label">Freq. Dominante</div>
                <div id="m-hz" class="metric-value">0.00 Hz</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Intensidad</div>
                <div id="m-pwr" class="metric-value">0.00</div>
            </div>
            <div class="metric-card">
                <div class="metric-label" id="m-axis-label">Vector Principal</div>
                <div id="m-axis" class="metric-value" style="font-size: 0.9rem;">[0.0, 0.0, 0.0]</div>
            </div>
        </div>

        <div class="settings-panel" id="mobile-settings">
            <div class="settings-header" onclick="document.getElementById('mobile-settings').classList.toggle('open')">
                ⚙️ Filtros DSP <span class="toggle-icon">▼</span>
            </div>
            <div class="settings-content">
                <div class="setting-item" title="Fuente del sensor">
                    <label>Sensor</label>
                    <select id="cfg-sensor">
                        <option value="acc" selected>Acelerómetro</option>
                        <option value="gyro">Giroscopio</option>
                        <option value="both">Ambos (Fusión)</option>
                    </select>
                </div>
                <div class="setting-item" title="Modo de análisis">
                    <label>Modo</label>
                    <select id="cfg-mode">
                        <option value="pca" selected>PCA</option>
                        <option value="mag">Magnitud</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>Refresco (s)</label>
                    <input type="number" id="cfg-refresh" value="0.05" step="0.01" min="0.01">
                </div>
                <div class="setting-item">
                    <label>Ventana (s)</label>
                    <input type="number" id="cfg-window" value="5" step="1" min="1">
                </div>
                <div class="setting-item">
                    <label>Suavizado (N)</label>
                    <input type="number" id="cfg-smooth" value="3" min="1" max="50">
                </div>
                <div class="setting-item">
                    <label>High-Pass (Hz)</label>
                    <input type="number" id="cfg-hp" value="0.5" step="0.1" min="0">
                </div>
                <div class="setting-item">
                    <label>Low-Pass (Hz)</label>
                    <input type="number" id="cfg-lp" value="12" step="1" min="0">
                </div>
                <div class="setting-item">
                    <label>Ponderación</label>
                    <select id="cfg-fft-weight">
                        <option value="0">Raw</option>
                        <option value="1" selected>Veloc.</option>
                        <option value="2">Despl.</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>FFT Mín (Hz)</label>
                    <input type="number" id="cfg-fft-min" value="0" step="0.1" min="0">
                </div>
                <div class="setting-item">
                    <label>FFT Máx (Hz)</label>
                    <input type="number" id="cfg-fft-max" value="12" step="1" min="1">
                </div>
            </div>
        </div>

        <div id="console-container">
            <div class="console-header">
                <span>Registro de Eventos</span>
                <button class="mobile-only close-console-btn" onclick="toggleConsole()">✖</button>
            </div>
            <div id="console"></div>
        </div>
    </aside>

    <div class="dashboard-content">
        <div class="chart-wrapper full-width" id="c-pca"></div>
        <div class="chart-wrapper full-width" id="c-fft"></div>
        <div class="chart-wrapper" id="c-acc"></div>
        <div class="chart-wrapper" id="c-gyro"></div>
    </div>
</main>

<script>
    const FREQ_SAMPLING = 100; // Hz
    let rawData = { ax: [], ay: [], az: [], gx: [], gy: [], gz: [], t: [] };
    let recordedSession = [];
    let isRecording = false;
    let dataStarted = false;
    let timeOffset = null; 

    const ACCEL_SCALE = 16384.0;
    const GYRO_SCALE = 2000.0 / 32768.0;

    function getMaxDataPoints() {
        const windowEl = document.getElementById('cfg-window');
        const w = windowEl ? (parseFloat(windowEl.value) || 5) : 5;
        return Math.floor(FREQ_SAMPLING * w);
    }

    const isDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const textCol = isDarkMode ? '#f1f5f9' : '#0f172a';

    function log(message, type = 'info') {
        const consoleEl = document.getElementById('console');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        const now = new Date().toLocaleTimeString([], { hour12: false, fractionDigits: 2 });
        entry.innerHTML = `<span class="log-time">[${now}]</span> <span class="log-${type}">${message}</span>`;
        consoleEl.appendChild(entry);
        consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    function toggleConsole() { document.getElementById('console-container').classList.toggle('show'); }

    // CORRECCIÓN CSP
    const createChartConfig = (title, seriesData) => ({
        chart: { backgroundColor: 'transparent', animation: false, style: { fontFamily: 'inherit' } },
        title: { text: title, align: 'left', style: { color: textCol, fontSize: '13px', fontWeight: 'bold' } },
        xAxis: { type: 'datetime', labels: { enabled: false }, gridLineWidth: 0, lineWidth: 0, tickWidth: 0 },
        yAxis: { title: { text: null }, gridLineColor: isDarkMode ? '#334155' : '#f1f5f9', labels: { style: { color: '#64748b' } } },
        legend: { enabled: true, itemStyle: { color: '#94a3b8', fontSize: '10px' } },
        credits: { enabled: false },
        tooltip: { enabled: false }, 
        series: seriesData,
        plotOptions: { 
            series: { 
                marker: { enabled: false }, 
                lineWidth: 1.5, 
                states: { hover: { enabled: false } },
                enableMouseTracking: false 
            } 
        }
    });

    const charts = {
        pca: Highcharts.chart('c-pca', createChartConfig('Señal Analizada (Fusión DSP)', [{ name: 'Amplitud', color: '#3b82f6', data: [], type: 'spline' }])),
        fft: Highcharts.chart('c-fft', { ...createChartConfig('Análisis de Frecuencia (FFT)', [{ name: 'Densidad Espectral', color: '#16a34a', data: [], type: 'area' }]), xAxis: { labels: { style: { color: '#64748b' } }, title: { text: 'Hz', style: { color: '#64748b' } } } }),
        acc: Highcharts.chart('c-acc', createChartConfig('Acelerómetro (G)', [{ name: 'X', color: '#ef4444', data: [] }, { name: 'Y', color: '#22c55e', data: [] }, { name: 'Z', color: '#3b82f6', data: [] }])),
        gyro: Highcharts.chart('c-gyro', createChartConfig('Giroscopio (°/s)', [{ name: 'X', color: '#f59e0b', data: [] }, { name: 'Y', color: '#8b5cf6', data: [] }, { name: 'Z', color: '#06b6d4', data: [] }]))
    };

    function processPhysData(t_esp, ax, ay, az, gx, gy, gz) {
        if (!dataStarted) { 
            dataStarted = true; 
            timeOffset = Date.now() - t_esp; 
            log("Flujo de datos iniciado.", "success"); 
            console.log("[DEBUG] Primer dato procesado y graficado exitosamente.");
        }
        if (timeOffset === null) timeOffset = Date.now() - t_esp;

        const now = t_esp + timeOffset;

        rawData.ax.push(ax); rawData.ay.push(ay); rawData.az.push(az);
        rawData.gx.push(gx); rawData.gy.push(gy); rawData.gz.push(gz);
        rawData.t.push(now);

        if (isRecording) recordedSession.push({ timestamp: new Date(now).toISOString(), ax, ay, az, gx, gy, gz });

        const currentMaxPoints = getMaxDataPoints();
        if (rawData.ax.length > currentMaxPoints) { 
            const overflow = rawData.ax.length - currentMaxPoints;
            Object.keys(rawData).forEach(k => rawData[k].splice(0, overflow)); 
        }

        const shift = charts.acc.series[0].data.length >= currentMaxPoints;
        charts.acc.series[0].addPoint([now, ax], false, shift);
        charts.acc.series[1].addPoint([now, ay], false, shift);
        charts.acc.series[2].addPoint([now, az], true, shift); 

        charts.gyro.series[0].addPoint([now, gx], false, shift);
        charts.gyro.series[1].addPoint([now, gy], false, shift);
        charts.gyro.series[2].addPoint([now, gz], true, shift); 
    }

    function processUSBString(line) {
        line = line.trim();
        if (!line) return;

        // Limpiar el caracter \r por si viene desde Windows
        line = line.replace('\r', '');

        console.log(`[USB LÍNEA PARSEADA] -> "${line}"`);

        const parts = line.split(',');
        
        if (parts.length === 7) {
            processPhysData(parseInt(parts[0]), parseInt(parts[1])/ACCEL_SCALE, parseInt(parts[2])/ACCEL_SCALE, parseInt(parts[3])/ACCEL_SCALE, parseInt(parts[4])*GYRO_SCALE, parseInt(parts[5])*GYRO_SCALE, parseInt(parts[6])*GYRO_SCALE);
        } else if (parts.length === 6) {
            processPhysData(Date.now(), parseInt(parts[0])/ACCEL_SCALE, parseInt(parts[1])/ACCEL_SCALE, parseInt(parts[2])/ACCEL_SCALE, parseInt(parts[3])*GYRO_SCALE, parseInt(parts[4])*GYRO_SCALE, parseInt(parts[5])*GYRO_SCALE);
        } else {
            console.warn(`[USB IGNORADO] Formato incorrecto. Partes: ${parts.length}`);
        }
    }

    function startRecording() {
        recordedSession = []; isRecording = true;
        document.getElementById('btn-record').disabled = true;
        document.getElementById('btn-record').classList.add('active');
        document.getElementById('btn-stop').disabled = false;
        log("Grabación iniciada...", "warning");
    }

    function stopRecording() {
        isRecording = false;
        document.getElementById('btn-record').disabled = false;
        document.getElementById('btn-record').classList.remove('active');
        document.getElementById('btn-stop').disabled = true;
        if (recordedSession.length === 0) return;
        
        const headers = ["Timestamp", "Accel_X", "Accel_Y", "Accel_Z", "Gyro_X", "Gyro_Y", "Gyro_Z"];
        const rows = recordedSession.map(s => [s.timestamp, s.ax, s.ay, s.az, s.gx, s.gy, s.gz]);
        let csvContent = "data:text/csv;charset=utf-8," + headers.join(",") + "\n" + rows.map(e => e.join(",")).join("\n");
        const link = document.createElement("a");
        link.setAttribute("href", encodeURI(csvContent));
        link.setAttribute("download", `captura_${Date.now()}.csv`);
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
        log("CSV descargado.", "success");
    }

    function applyMovingAverage(data, windowSize) {
        if (windowSize <= 1) return data;
        let res = [];
        for (let i = 0; i < data.length; i++) {
            let start = Math.max(0, i - windowSize + 1);
            let sum = 0;
            for (let j = start; j <= i; j++) sum += data[j];
            res.push(sum / (i - start + 1));
        }
        return res;
    }

    function applyIIRFilter(data, cutoff, type, dt) {
        if (!cutoff || cutoff <= 0 || cutoff >= 1/(2*dt)) return data;
        let rc = 1.0 / (cutoff * 2 * Math.PI);
        let res = [];
        if (type === 'low') {
            res.push(data[0]); 
            let alpha = dt / (rc + dt);
            for (let i = 1; i < data.length; i++) res.push(res[i-1] + alpha * (data[i] - res[i-1]));
        } else if (type === 'high') {
            res.push(0); 
            let alpha = rc / (rc + dt);
            for (let i = 1; i < data.length; i++) res.push(alpha * (res[i-1] + data[i] - data[i-1]));
        }
        return res;
    }

    let lastAnalysisTime = 0;

    // --- Loop Principal DSP ---
    setInterval(() => {
        if (rawData.ax.length < 32) return;
        
        const refreshMs = (parseFloat(document.getElementById('cfg-refresh').value) || 0.05) * 1000;
        const now = Date.now();
        if (now - lastAnalysisTime < refreshMs) return;
        lastAnalysisTime = now;

        const n_total = rawData.ax.length;
        const mode = document.getElementById('cfg-mode').value;
        const sensorSource = document.getElementById('cfg-sensor').value;
        const smoothWin = parseInt(document.getElementById('cfg-smooth').value) || 1;
        const hpFreq = parseFloat(document.getElementById('cfg-hp').value) || 0;
        const lpFreq = parseFloat(document.getElementById('cfg-lp').value) || 12;
        const fftMin = parseFloat(document.getElementById('cfg-fft-min').value) || 0;
        const fftMax = parseFloat(document.getElementById('cfg-fft-max').value) || 12;
        const fftWeight = parseInt(document.getElementById('cfg-fft-weight').value) || 1;
        const windowSec = parseFloat(document.getElementById('cfg-window').value) || 5;
        
        const timeSpanMs = rawData.t[n_total - 1] - rawData.t[0];
        const actualFS = timeSpanMs > 0 ? (n_total / timeSpanMs) * 1000 : FREQ_SAMPLING;
        const dt = 1.0 / actualFS;

        const pointsToAnalyze = Math.min(n_total, Math.floor(windowSec * actualFS));
        if (pointsToAnalyze < 32) return;

        // Selección de Canales y Fusión
        const t_slice = rawData.t.slice(-pointsToAnalyze);
        let channels = [];
        
        const gyroScale = 100.0; 

        if (sensorSource === 'acc') {
            channels.push(rawData.ax.slice(-pointsToAnalyze), rawData.ay.slice(-pointsToAnalyze), rawData.az.slice(-pointsToAnalyze));
        } else if (sensorSource === 'gyro') {
            channels.push(rawData.gx.slice(-pointsToAnalyze), rawData.gy.slice(-pointsToAnalyze), rawData.gz.slice(-pointsToAnalyze));
        } else if (sensorSource === 'both') {
            channels.push(
                rawData.ax.slice(-pointsToAnalyze), rawData.ay.slice(-pointsToAnalyze), rawData.az.slice(-pointsToAnalyze),
                rawData.gx.slice(-pointsToAnalyze).map(v => v/gyroScale), 
                rawData.gy.slice(-pointsToAnalyze).map(v => v/gyroScale), 
                rawData.gz.slice(-pointsToAnalyze).map(v => v/gyroScale)
            );
        }

        channels = channels.map(ch => applyIIRFilter(applyIIRFilter(applyMovingAverage(ch, smoothWin), lpFreq, 'low', dt), hpFreq, 'high', dt));

        let signalToAnalyze = [];
        const n = pointsToAnalyze;
        const dims = channels.length; 

        if (mode === 'pca') {
            const centered = [];
            for (let i = 0; i < n; i++) {
                let row = [];
                for (let d = 0; d < dims; d++) row.push(channels[d][i]);
                centered.push(row);
            }

            let ev = new Array(dims).fill(1);
            for(let i=0; i<8; i++) {
                let next_ev = new Array(dims).fill(0);
                for(let r=0; r<dims; r++) {
                    for(let c=0; c<dims; c++) {
                        let cov_rc = 0;
                        for(let row=0; row<n; row++) cov_rc += (centered[row][r] * centered[row][c]) / (n-1);
                        next_ev[r] += cov_rc * ev[c];
                    }
                }
                const norm = Math.sqrt(next_ev.reduce((s, x) => s + x*x, 0));
                ev = next_ev.map(x => x / (norm || 1));
            }
            signalToAnalyze = centered.map(r => r.reduce((s, v, j) => s + v * ev[j], 0));
            
            document.getElementById('m-axis-label').innerText = "Vector PCA";
            document.getElementById('m-axis').innerText = dims === 3 ? 
                `[${ev[0].toFixed(2)}, ${ev[1].toFixed(2)}, ${ev[2].toFixed(2)}]` : `Vector 6D Fusionado`;

        } else if (mode === 'mag') {
            let mag_raw = [];
            for(let i=0; i<n; i++) {
                let sumSq = 0;
                for(let d=0; d<dims; d++) sumSq += (channels[d][i] * channels[d][i]);
                mag_raw.push(Math.sqrt(sumSq));
            }
            signalToAnalyze = mag_raw;
            document.getElementById('m-axis-label').innerText = "Métrica";
            document.getElementById('m-axis').innerText = dims === 3 ? `Magnitud 3D` : `Magnitud 6D`;
        }

        charts.pca.series[0].setData(signalToAnalyze.map((v, i) => [t_slice[i], v]), true, false, false);

        // 5. Cálculo FFT
        const fftLen = Math.pow(2, Math.floor(Math.log2(signalToAnalyze.length)));
        const signal = signalToAnalyze.slice(-fftLen);
        for (let i = 0; i < fftLen; i++) signal[i] = signal[i] * (0.5 * (1 - Math.cos((2 * Math.PI * i) / (fftLen - 1))));

        const spectrum = [];
        let maxP = 0, domF = 0;

        for (let k = 0; k < fftLen / 2; k++) {
            let re = 0, im = 0;
            for (let t = 0; t < fftLen; t++) {
                const angle = (2 * Math.PI * k * t) / fftLen;
                re += signal[t] * Math.cos(angle);
                im -= signal[t] * Math.sin(angle);
            }
            
            let mag = Math.sqrt(re*re + im*im);
            const freq = k * (actualFS / fftLen);
            
            if (freq > 0) {
                if (fftWeight === 1) mag = mag / freq;           
                else if (fftWeight === 2) mag = mag / (freq * freq); 
            }
            
            if (freq >= fftMin && freq <= fftMax) {
                spectrum.push([freq, mag]);
                if (k > 0 && mag > maxP) { maxP = mag; domF = freq; }
            }
        }

        charts.fft.xAxis[0].setExtremes(fftMin, fftMax, false);
        charts.fft.series[0].setData(spectrum, true);
        document.getElementById('m-hz').innerText = domF.toFixed(2) + " Hz";
        document.getElementById('m-pwr').innerText = maxP.toFixed(2);
    }, 50);

    // --- Conectividad ---
    async function connectUSB() {
        try {
            console.log("[DEBUG USB] --- Iniciando solicitud de conexión ---");
            log("Solicitando puerto serie USB...", "info");
            const port = await navigator.serial.requestPort();
            
            console.log("[DEBUG USB] Puerto abierto a 115200");
            await port.open({ baudRate: 115200 });

            // Es fundamental activar el DTR sin reiniciar para habilitar la transmisión en los puertos nativos
            try { 
                await port.setSignals({ dataTerminalReady: true, requestToSend: false }); 
                console.log("[DEBUG USB] DTR activado.");
            } catch (e) {
                console.warn("[DEBUG USB] DTR no soportado por SO:", e);
            }
            
            log("Puerto abierto. Esperando datos...", "success");
            
            dataStarted = false;
            timeOffset = null; 

            const decoder = new TextDecoderStream();
            port.readable.pipeTo(decoder.writable);
            const reader = decoder.readable.getReader();
            let buf = "";
            
            console.log("[DEBUG USB] Bucle de lectura escuchando...");

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                
                // IMPRIMIR CADA FRAGMENTO CRUDO QUE LLEGA DESDE EL CABLE
                console.log("[USB FRAGMENTO CRUDO RECIBIDO]:", value);
                
                buf += value;
                const lines = buf.split(/\r?\n/);
                buf = lines.pop(); // Guardar trozo incompleto
                
                for (let i=0; i<lines.length; i++) {
                    processUSBString(lines[i]);
                }
            }
        } catch (err) { 
            console.error("[DEBUG USB] Error capturado:", err);
            log("Error USB: " + err.message, "error"); 
        }
    }

    async function connectBLE() {
        try {
            log("Escaneando dispositivos BLE...");
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: "ESP32" }],
                optionalServices: ["6e400001-b5a3-f393-e0a9-e50e24dcca9e"]
            });

            device.addEventListener('gattserverdisconnected', () => { log("Conexión BLE cortada.", "error"); });

            let server = await device.gatt.connect();
            await new Promise(resolve => setTimeout(resolve, 1000)); 
            let service = await server.getPrimaryService("6e400001-b5a3-f393-e0a9-e50e24dcca9e");
            let tx = await service.getCharacteristic("6e400003-b5a3-f393-e0a9-e50e24dcca9e");
            
            await tx.startNotifications();
            dataStarted = false;
            timeOffset = null; 
            log("BLE suscrito. Recibiendo datos...", "success");

            tx.addEventListener('characteristicvaluechanged', (e) => {
                const view = e.target.value; 
                if(view.byteLength === 16) {
                    processPhysData(view.getUint32(0, true), view.getInt16(4, true)/ACCEL_SCALE, view.getInt16(6, true)/ACCEL_SCALE, view.getInt16(8, true)/ACCEL_SCALE, view.getInt16(10, true)*GYRO_SCALE, view.getInt16(12, true)*GYRO_SCALE, view.getInt16(14, true)*GYRO_SCALE);
                } else if (view.byteLength === 12) {
                    processPhysData(Date.now(), view.getInt16(0, true)/ACCEL_SCALE, view.getInt16(2, true)/ACCEL_SCALE, view.getInt16(4, true)/ACCEL_SCALE, view.getInt16(6, true)*GYRO_SCALE, view.getInt16(8, true)*GYRO_SCALE, view.getInt16(10, true)*GYRO_SCALE);
                }
            });
        } catch (err) { log("Error BLE: " + err.message, "error"); }
    }
