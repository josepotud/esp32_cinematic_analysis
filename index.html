<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador de Movimiento Cinemático</title>
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --accent: #2563eb;
            --success: #16a34a;
            --warning: #ca8a04;
            --danger: #dc2626;
            --console-bg: #1e293b;
            --console-text: #f1f5f9;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #020617;
                --bg-secondary: #0f172a;
                --card-bg: #1e293b;
                --text-main: #f1f5f9;
                --text-muted: #94a3b8;
                --border: #334155;
                --accent: #3b82f6;
            }
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Header & Navigation --- */
        header {
            padding: 12px 24px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            z-index: 10;
        }

        .brand {
            flex: 1 1 auto;
            min-width: 200px;
        }

        .brand h1 {
            font-size: 1rem;
            margin: 0;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            line-height: 1.2;
            white-space: normal; 
        }

        .controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            flex: 0 1 auto;
            justify-content: flex-end;
        }

        button {
            padding: 8px 14px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text-main);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        button:hover:not(:disabled) {
            background: var(--bg-secondary);
            border-color: var(--accent);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button.primary {
            background: var(--accent);
            color: white;
            border: none;
        }

        button.record {
            background: var(--danger);
            color: white;
            border: none;
        }
        
        button.record.active {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .desktop-only { display: block; }
        .mobile-only { display: none !important; }

        /* --- Main Content Layout --- */
        main {
            display: grid;
            grid-template-columns: 320px 1fr;
            grid-template-rows: auto 1fr;
            flex: 1;
            overflow: hidden;
        }

        /* --- Sidebar & Console --- */
        aside {
            grid-row: 1 / 3;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 16px;
            overflow-y: auto;
        }

        .metrics-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .metric-card {
            background: var(--card-bg);
            padding: 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .metric-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .metric-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
        }

        /* --- Panel de Ajustes DSP --- */
        .settings-panel {
            background: var(--card-bg);
            padding: 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .settings-header {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--text-main);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .setting-item input, .setting-item select {
            width: 75px;
            padding: 4px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 4px;
            font-family: inherit;
            text-align: right;
            outline: none;
        }

        #console-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--console-bg);
            border-radius: 8px;
            overflow: hidden;
            min-height: 200px;
        }

        .console-header {
            padding: 10px 12px;
            background: #0f172a;
            color: #94a3b8;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-console-btn {
            background: transparent;
            border: none;
            color: #f1f5f9;
            font-size: 1.2rem;
            padding: 0;
            line-height: 1;
            cursor: pointer;
        }

        #console {
            padding: 12px;
            font-family: 'SFMono-Regular', Consolas, monospace;
            font-size: 0.75rem;
            color: var(--console-text);
            overflow-y: auto;
            flex: 1;
            line-height: 1.5;
        }

        .log-entry { margin-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 2px; }
        .log-time { color: #64748b; margin-right: 8px; }
        .log-info { color: #3b82f6; }
        .log-success { color: #22c55e; }
        .log-error { color: #ef4444; }
        .log-warning { color: var(--warning); }

        /* --- Dashboard Area --- */
        .dashboard-content {
            padding: 16px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 16px;
            overflow-y: auto;
        }

        .chart-wrapper {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            position: relative;
            min-height: 250px;
        }

        .full-width { grid-column: span 2; }

        /* --- Responsive Adjustments --- */
        @media (max-width: 900px) {
            header { justify-content: center; text-align: center; }
            .brand { width: 100%; margin-bottom: 4px; }
            .controls { width: 100%; justify-content: center; }
            .desktop-only { display: none; }
        }

        @media (max-width: 768px) {
            .mobile-only { display: flex !important; }
            main {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
            }
            aside {
                grid-row: auto;
                height: auto;
                border-right: none;
                border-bottom: 1px solid var(--border);
                padding: 12px;
            }
            
            /* Métricas en fila para móvil */
            .metrics-container {
                flex-direction: row;
                flex-wrap: nowrap;
                overflow-x: auto;
                gap: 8px;
                padding-bottom: 4px;
            }
            .metric-card {
                flex: 1;
                min-width: 110px;
                padding: 10px;
                text-align: center;
            }
            .metric-value { font-size: 1.2rem; }

            /* Consola Flotante en Móvil */
            #console-container {
                position: fixed;
                top: 0; left: 0; width: 100vw; height: 100vh;
                border-radius: 0;
                z-index: 1000;
                transform: translateY(100%);
                transition: transform 0.3s ease-in-out;
            }
            #console-container.show {
                transform: translateY(0);
            }

            .dashboard-content {
                grid-template-columns: 1fr;
                padding: 12px;
            }
            .full-width { grid-column: auto; }
            .brand h1 { font-size: 0.9rem; }
        }

        @media (max-width: 480px) {
            header { padding: 12px; }
            .controls { gap: 6px; }
            button { padding: 8px 10px; font-size: 0.75rem; flex: 1 1 auto; justify-content: center; }
        }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <h1>Análisis Cinemático</h1>
    </div>
    <div class="controls">
        <button onclick="connectUSB()" class="primary">
            <span>🔌</span> USB
        </button>
        <button onclick="connectBLE()">
            <span>🔵</span> BLE
        </button>
        <div style="width: 1px; background: var(--border); margin: 0 4px;" class="desktop-only"></div>
        <button id="btn-record" onclick="startRecording()" class="record">
            <span>🔴</span> Grabar
        </button>
        <button id="btn-stop" onclick="stopRecording()" disabled>
            <span>⏹️</span> Stop
        </button>
        <!-- Botón exclusivo para mostrar la consola en móvil -->
        <button onclick="toggleConsole()" class="mobile-only" style="background: var(--console-bg); color: white; border: none;">
            <span>📜</span> Consola
        </button>
    </div>
</header>

<main>
    <aside>
        <div class="metrics-container">
            <div class="metric-card">
                <div class="metric-label">Freq. Dominante</div>
                <div id="m-hz" class="metric-value">0.00 Hz</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Intensidad</div>
                <div id="m-pwr" class="metric-value">0.00</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Vector PCA</div>
                <div id="m-axis" class="metric-value" style="font-size: 0.9rem;">[0.0, 0.0, 0.0]</div>
            </div>
        </div>

        <!-- Panel de Filtros DSP -->
        <div class="settings-panel">
            <div class="settings-header">Filtros DSP</div>
            <div class="setting-item" title="Ventana de Media Móvil (1 = Desactivado)">
                <label>Suavizado (N)</label>
                <input type="number" id="cfg-smooth" value="3" min="1" max="50">
            </div>
            <div class="setting-item" title="Filtro Pasa Altos: Elimina gravedad y deriva estática">
                <label>High-Pass (Hz)</label>
                <input type="number" id="cfg-hp" value="0.5" step="0.1" min="0">
            </div>
            <div class="setting-item" title="Filtro Pasa Bajos: Elimina ruido eléctrico de alta frec.">
                <label>Low-Pass (Hz)</label>
                <input type="number" id="cfg-lp" value="40" step="1" min="0">
            </div>
            <div class="setting-item" title="Integra la señal de aceleración para destacar movimientos reales frente a vibraciones rápidas">
                <label>Ponderación</label>
                <select id="cfg-fft-weight">
                    <option value="0">Accel (Raw)</option>
                    <option value="1" selected>Veloc. (1/f)</option>
                    <option value="2">Despl. (1/f²)</option>
                </select>
            </div>
            <div class="setting-item">
                <label>FFT Mín (Hz)</label>
                <input type="number" id="cfg-fft-min" value="0.5" step="0.1" min="0">
            </div>
            <div class="setting-item">
                <label>FFT Máx (Hz)</label>
                <input type="number" id="cfg-fft-max" value="50" step="1" min="1">
            </div>
        </div>

        <!-- La consola se comporta normal en PC y como modal overlay en móvil -->
        <div id="console-container">
            <div class="console-header">
                <span>Registro de Eventos</span>
                <button class="mobile-only close-console-btn" onclick="toggleConsole()">✖</button>
            </div>
            <div id="console"></div>
        </div>
    </aside>

    <div class="dashboard-content">
        <div class="chart-wrapper" id="c-acc"></div>
        <div class="chart-wrapper" id="c-gyro"></div>
        <div class="chart-wrapper full-width" id="c-pca"></div>
        <div class="chart-wrapper full-width" id="c-fft"></div>
    </div>
</main>

<script>
    // --- Configuración Técnica ---
    const FREQ_SAMPLING = 100; // Hz (Aumentada la resolución temporal a 100Hz)
    const VIEW_WINDOW_SEC = 10;
    const MAX_DATA_POINTS = FREQ_SAMPLING * VIEW_WINDOW_SEC;
    
    let rawData = { ax: [], ay: [], az: [], gx: [], gy: [], gz: [], t: [] };
    let recordedSession = [];
    let isRecording = false;

    const isDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const textCol = isDarkMode ? '#f1f5f9' : '#0f172a';

    // --- Motor de Registro y UI ---
    function log(message, type = 'info') {
        const consoleEl = document.getElementById('console');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        const now = new Date().toLocaleTimeString([], { hour12: false, fractionDigits: 2 });
        entry.innerHTML = `<span class="log-time">[${now}]</span> <span class="log-${type}">${message}</span>`;
        consoleEl.appendChild(entry);
        consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    function toggleConsole() {
        document.getElementById('console-container').classList.toggle('show');
    }

    // --- Configuración de Gráficos (CORREGIDO PARA HIGHCHARTS) ---
    const createChartConfig = (title, seriesData) => ({
        chart: { backgroundColor: 'transparent', animation: false, style: { fontFamily: 'inherit' } },
        title: { text: title, align: 'left', style: { color: textCol, fontSize: '13px', fontWeight: 'bold' } },
        xAxis: { type: 'datetime', labels: { enabled: false }, gridLineWidth: 0, lineWidth: 0, tickWidth: 0 },
        yAxis: { title: { text: null }, gridLineColor: isDarkMode ? '#334155' : '#f1f5f9', labels: { style: { color: '#64748b' } } },
        legend: { enabled: true, itemStyle: { color: '#94a3b8', fontSize: '10px' } },
        credits: { enabled: false },
        series: seriesData,
        plotOptions: { series: { marker: { enabled: false }, lineWidth: 1.5, states: { hover: { enabled: false } } } }
    });

    // Pasamos el ID del contenedor como primer argumento de Highcharts.chart
    const charts = {
        acc: Highcharts.chart('c-acc', createChartConfig('Acelerómetro (G)', [
            { name: 'X', color: '#ef4444', data: [] }, { name: 'Y', color: '#22c55e', data: [] }, { name: 'Z', color: '#3b82f6', data: [] }
        ])),
        gyro: Highcharts.chart('c-gyro', createChartConfig('Giroscopio (°/s)', [
            { name: 'X', color: '#f59e0b', data: [] }, { name: 'Y', color: '#8b5cf6', data: [] }, { name: 'Z', color: '#06b6d4', data: [] }
        ])),
        pca: Highcharts.chart('c-pca', createChartConfig('Componente Principal (PCA)', [
            { name: 'Señal Proyectada', color: '#3b82f6', data: [], type: 'spline' }
        ])),
        fft: Highcharts.chart('c-fft', {
            ...createChartConfig('Análisis de Frecuencia (FFT)', [{ name: 'Densidad Espectral', color: '#16a34a', data: [], type: 'area' }]),
            xAxis: { labels: { style: { color: '#64748b' } }, title: { text: 'Hz', style: { color: '#64748b' } } }
        })
    };

    // --- Procesamiento de Señal ---
    function processIncoming(line) {
        try {
            const d = JSON.parse(line);
            const now = Date.now();
            
            rawData.ax.push(d.ax); rawData.ay.push(d.ay); rawData.az.push(d.az);
            rawData.gx.push(d.gx); rawData.gy.push(d.gy); rawData.gz.push(d.gz);
            rawData.t.push(now);

            if (isRecording) {
                recordedSession.push({
                    timestamp: new Date(now).toISOString(),
                    ax: d.ax, ay: d.ay, az: d.az,
                    gx: d.gx, gy: d.gy, gz: d.gz
                });
            }

            if (rawData.ax.length > MAX_DATA_POINTS) {
                Object.keys(rawData).forEach(k => rawData[k].shift());
            }

            const shift = charts.acc.series[0].data.length > MAX_DATA_POINTS;
            charts.acc.series[0].addPoint([now, d.ax], false, shift);
            charts.acc.series[1].addPoint([now, d.ay], false, shift);
            charts.acc.series[2].addPoint([now, d.az], true, shift);

            charts.gyro.series[0].addPoint([now, d.gx], false, shift);
            charts.gyro.series[1].addPoint([now, d.gy], false, shift);
            charts.gyro.series[2].addPoint([now, d.gz], true, shift);

        } catch (e) { }
    }

    // --- Funciones de Grabación ---
    function startRecording() {
        recordedSession = [];
        isRecording = true;
        document.getElementById('btn-record').disabled = true;
        document.getElementById('btn-record').classList.add('active');
        document.getElementById('btn-stop').disabled = false;
        log("Iniciada grabación de datos en crudo...", "warning");
    }

    function stopRecording() {
        isRecording = false;
        document.getElementById('btn-record').disabled = false;
        document.getElementById('btn-record').classList.remove('active');
        document.getElementById('btn-stop').disabled = true;
        
        if (recordedSession.length === 0) {
            log("No hay datos grabados para descargar.", "error");
            return;
        }

        log(`Grabación finalizada. Procesando ${recordedSession.length} muestras...`, "success");
        downloadCSV();
    }

    function downloadCSV() {
        const headers = ["Timestamp", "Accel_X", "Accel_Y", "Accel_Z", "Gyro_X", "Gyro_Y", "Gyro_Z"];
        const rows = recordedSession.map(s => [
            s.timestamp, s.ax, s.ay, s.az, s.gx, s.gy, s.gz
        ]);

        let csvContent = "data:text/csv;charset=utf-8," 
            + headers.join(",") + "\n"
            + rows.map(e => e.join(",")).join("\n");

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `captura_movimiento_${Date.now()}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        log("Archivo CSV generado y descargado.", "success");
    }

    // --- Filtros DSP ---
    function applyMovingAverage(data, windowSize) {
        if (windowSize <= 1) return data;
        let res = [];
        for (let i = 0; i < data.length; i++) {
            let start = Math.max(0, i - windowSize + 1);
            let sum = 0;
            for (let j = start; j <= i; j++) sum += data[j];
            res.push(sum / (i - start + 1));
        }
        return res;
    }

    function applyIIRFilter(data, cutoff, type, dt) {
        if (!cutoff || cutoff <= 0 || cutoff >= 1/(2*dt)) return data;
        let rc = 1.0 / (cutoff * 2 * Math.PI);
        let res = [data[0]];
        
        if (type === 'low') {
            let alpha = dt / (rc + dt);
            for (let i = 1; i < data.length; i++) res.push(res[i-1] + alpha * (data[i] - res[i-1]));
        } else if (type === 'high') {
            let alpha = rc / (rc + dt);
            for (let i = 1; i < data.length; i++) res.push(alpha * (res[i-1] + data[i] - data[i-1]));
        }
        return res;
    }

    // --- Loop de Análisis PCA y FFT ---
    setInterval(() => {
        if (rawData.ax.length < 32) return;
        const n = rawData.ax.length;
        
        // 1. Obtener valores de la interfaz DSP
        const smoothWin = parseInt(document.getElementById('cfg-smooth').value) || 1;
        const hpFreq = parseFloat(document.getElementById('cfg-hp').value) || 0;
        const lpFreq = parseFloat(document.getElementById('cfg-lp').value) || 0;
        const fftMin = parseFloat(document.getElementById('cfg-fft-min').value) || 0;
        const fftMax = parseFloat(document.getElementById('cfg-fft-max').value) || (FREQ_SAMPLING/2);
        const fftWeight = parseInt(document.getElementById('cfg-fft-weight').value) || 0;
        
        // --- Frecuencia de muestreo dinámica ---
        const timeSpanMs = rawData.t[n - 1] - rawData.t[0];
        const actualFS = timeSpanMs > 0 ? (n / timeSpanMs) * 1000 : FREQ_SAMPLING;
        const dt = 1.0 / actualFS;

        // 2. Extraer y aplicar filtros en cascada
        let f_ax = applyMovingAverage(rawData.ax, smoothWin);
        let f_ay = applyMovingAverage(rawData.ay, smoothWin);
        let f_az = applyMovingAverage(rawData.az, smoothWin);

        f_ax = applyIIRFilter(f_ax, lpFreq, 'low', dt);
        f_ay = applyIIRFilter(f_ay, lpFreq, 'low', dt);
        f_az = applyIIRFilter(f_az, lpFreq, 'low', dt);

        f_ax = applyIIRFilter(f_ax, hpFreq, 'high', dt);
        f_ay = applyIIRFilter(f_ay, hpFreq, 'high', dt);
        f_az = applyIIRFilter(f_az, hpFreq, 'high', dt);

        // 3. Preparar matriz centrada para PCA
        const matrix = [];
        const means = [0, 0, 0];

        for(let i=0; i<n; i++) {
            means[0] += f_ax[i]/n; means[1] += f_ay[i]/n; means[2] += f_az[i]/n;
            matrix.push([f_ax[i], f_ay[i], f_az[i]]);
        }
        const centered = matrix.map(r => r.map((v, j) => v - means[j]));

        // 4. Power Iteration para autovector (PC1)
        let ev = [1, 1, 1];
        for(let i=0; i<8; i++) {
            let next_ev = [0, 0, 0];
            for(let r=0; r<3; r++) {
                for(let c=0; c<3; c++) {
                    let cov_rc = 0;
                    centered.forEach(row => cov_rc += (row[r] * row[c]) / (n-1));
                    next_ev[r] += cov_rc * ev[c];
                }
            }
            const norm = Math.sqrt(next_ev.reduce((s, x) => s + x*x, 0));
            ev = next_ev.map(x => x / (norm || 1));
        }

        const projection = centered.map(r => r.reduce((s, v, j) => s + v * ev[j], 0));
        charts.pca.series[0].setData(projection.map((v, i) => [rawData.t[i], v]), true, false, false);
        document.getElementById('m-axis').innerText = `[${ev[0].toFixed(2)}, ${ev[1].toFixed(2)}, ${ev[2].toFixed(2)}]`;

        // 5. Cálculo FFT sobre la señal filtrada con Ponderación de Espectro
        const fftLen = Math.pow(2, Math.floor(Math.log2(projection.length)));
        const signal = projection.slice(-fftLen);
        const spectrum = [];
        let maxP = 0, domF = 0;

        for (let k = 0; k < fftLen / 2; k++) {
            let re = 0, im = 0;
            for (let t = 0; t < fftLen; t++) {
                const angle = (2 * Math.PI * k * t) / fftLen;
                re += signal[t] * Math.cos(angle);
                im -= signal[t] * Math.sin(angle);
            }
            
            let mag = Math.sqrt(re*re + im*im);
            const freq = k * (actualFS / fftLen);
            
            // Ponderación (Transformar la aceleración a Velocidad o Desplazamiento en dominio de frecuencia)
            // Se atenúan fuertemente las altas frecuencias porque dividimos por freq o freq^2
            if (freq > 0) {
                if (fftWeight === 1) { // Velocidad (1/f)
                    mag = mag / freq;
                } else if (fftWeight === 2) { // Desplazamiento (1/f²)
                    mag = mag / (freq * freq);
                }
            }
            
            // Restringir el análisis visual y matemático a los márgenes definidos
            if (freq >= fftMin && freq <= fftMax) {
                spectrum.push([freq, mag]);
                if (k > 0 && mag > maxP) { maxP = mag; domF = freq; }
            }
        }

        charts.fft.xAxis[0].setExtremes(fftMin, fftMax, false);
        charts.fft.series[0].setData(spectrum, true);
        document.getElementById('m-hz').innerText = domF.toFixed(2) + " Hz";
        document.getElementById('m-pwr').innerText = maxP.toFixed(2);
    }, 500);

    // --- Conectividad ---
    async function connectUSB() {
        try {
            log("Solicitando acceso a puerto serie...");
            const port = await navigator.serial.requestPort();
            await port.open({ baudRate: 115200 });
            log("Puerto serie abierto a 115200 baudios", "success");
            const decoder = new TextDecoderStream();
            port.readable.pipeTo(decoder.writable);
            const reader = decoder.readable.getReader();
            let buf = "";
            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                buf += value;
                const lines = buf.split("\n");
                buf = lines.pop();
                lines.forEach(processIncoming);
            }
        } catch (err) { log("Error de conexión USB: " + err.message, "error"); }
    }

    async function connectBLE() {
        try {
            log("Escaneando dispositivos BLE...");
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: "ESP32-C3" }],
                optionalServices: ["6e400001-b5a3-f393-e0a9-e50e24dcca9e"]
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService("6e400001-b5a3-f393-e0a9-e50e24dcca9e");
            const tx = await service.getCharacteristic("6e400003-b5a3-f393-e0a9-e50e24dcca9e");
            await tx.startNotifications();
            tx.addEventListener('characteristicvaluechanged', (e) => {
                const text = new TextDecoder().decode(e.target.value);
                processIncoming(text);
            });
            log("BLE conectado y suscrito", "success");
        } catch (err) { log("Error BLE: " + err.message, "error"); }
    }
