<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador de Movimiento Cinemático</title>
    <script src="https://code.highcharts.com/highcharts.js"></script>
    <style>
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --accent: #2563eb;
            --success: #16a34a;
            --warning: #ca8a04;
            --danger: #dc2626;
            --console-bg: #1e293b;
            --console-text: #f1f5f9;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #020617;
                --bg-secondary: #0f172a;
                --card-bg: #1e293b;
                --text-main: #f1f5f9;
                --text-muted: #94a3b8;
                --border: #334155;
                --accent: #3b82f6;
            }
        }

        body {
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Header & Navigation --- */
        header {
            padding: 12px 24px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .brand h1 {
            font-size: 1rem;
            margin: 0;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text-main);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        button:hover:not(:disabled) {
            background: var(--bg-secondary);
            border-color: var(--accent);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button.primary {
            background: var(--accent);
            color: white;
            border: none;
        }

        button.record {
            background: var(--danger);
            color: white;
            border: none;
        }
        
        button.record.active {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        /* --- Main Content Layout --- */
        main {
            display: grid;
            grid-template-columns: 320px 1fr;
            grid-template-rows: auto 1fr;
            flex: 1;
            overflow: hidden;
        }

        /* --- Sidebar & Console --- */
        aside {
            grid-row: 1 / 3;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 16px;
            gap: 16px;
            overflow-y: auto;
        }

        .metric-card {
            background: var(--card-bg);
            padding: 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .metric-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .metric-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
        }

        #console-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--console-bg);
            border-radius: 8px;
            overflow: hidden;
            min-height: 200px;
        }

        .console-header {
            padding: 6px 12px;
            background: #0f172a;
            color: #94a3b8;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        #console {
            padding: 12px;
            font-family: 'SFMono-Regular', Consolas, monospace;
            font-size: 0.75rem;
            color: var(--console-text);
            overflow-y: auto;
            flex: 1;
            line-height: 1.5;
        }

        .log-entry { margin-bottom: 4px; }
        .log-time { color: #64748b; margin-right: 8px; }
        .log-info { color: #3b82f6; }
        .log-success { color: #22c55e; }
        .log-error { color: #ef4444; }
        .log-warning { color: var(--warning); }

        /* --- Dashboard Area --- */
        .dashboard-content {
            padding: 16px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 16px;
            overflow-y: auto;
        }

        .chart-wrapper {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            position: relative;
        }

        .full-width { grid-column: span 2; }

        @media (max-width: 1000px) {
            main { grid-template-columns: 1fr; }
            aside { grid-row: auto; order: 2; height: 300px; }
            .dashboard-content { grid-template-columns: 1fr; }
            .full-width { grid-column: auto; }
        }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <h1>Sistema de Análisis Cinemático</h1>
    </div>
    <div class="controls">
        <button onclick="connectUSB()" class="primary">
            <span>🔌</span> USB (Serial)
        </button>
        <button onclick="connectBLE()">
            <span>🔵</span> Bluetooth
        </button>
        <div style="width: 1px; background: var(--border); margin: 0 10px;"></div>
        <button id="btn-record" onclick="startRecording()" class="record">
            <span>🔴</span> Grabar
        </button>
        <button id="btn-stop" onclick="stopRecording()" disabled>
            <span>⏹️</span> Parar y Descargar
        </button>
    </div>
</header>

<main>
    <aside>
        <div class="metric-card">
            <div class="metric-label">Frecuencia Dominante</div>
            <div id="m-hz" class="metric-value">0.00 Hz</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Intensidad Señal</div>
            <div id="m-pwr" class="metric-value">0.00</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Vector Principal</div>
            <div id="m-axis" class="metric-value" style="font-size: 1rem;">N/A</div>
        </div>

        <div id="console-container">
            <div class="console-header">Registro de Eventos</div>
            <div id="console"></div>
        </div>
    </aside>

    <div class="dashboard-content">
        <div class="chart-wrapper" id="c-acc"></div>
        <div class="chart-wrapper" id="c-gyro"></div>
        <div class="chart-wrapper full-width" id="c-pca"></div>
        <div class="chart-wrapper full-width" id="c-fft"></div>
    </div>
</main>

<script>
    // --- Configuración Técnica ---
    const FREQ_SAMPLING = 30; // Hz
    const VIEW_WINDOW_SEC = 10;
    const MAX_DATA_POINTS = FREQ_SAMPLING * VIEW_WINDOW_SEC;
    
    let rawData = { ax: [], ay: [], az: [], gx: [], gy: [], gz: [], t: [] };
    let recordedSession = [];
    let isRecording = false;

    const isDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const textCol = isDarkMode ? '#f1f5f9' : '#0f172a';

    // --- Motor de Registro ---
    function log(message, type = 'info') {
        const consoleEl = document.getElementById('console');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        const now = new Date().toLocaleTimeString([], { hour12: false, fractionDigits: 2 });
        entry.innerHTML = `<span class="log-time">${now}</span> <span class="log-${type}">${message}</span>`;
        consoleEl.appendChild(entry);
        consoleEl.scrollTop = consoleEl.scrollHeight;
    }

    // --- Configuración de Gráficos ---
    const createChartConfig = (title, seriesData) => ({
        chart: { backgroundColor: 'transparent', animation: false, style: { fontFamily: 'inherit' } },
        title: { text: title, align: 'left', style: { color: textCol, fontSize: '13px', fontWeight: 'bold' } },
        xAxis: { type: 'datetime', labels: { enabled: false }, gridLineWidth: 0, lineWidth: 0 },
        yAxis: { title: { text: null }, gridLineColor: isDarkMode ? '#334155' : '#f1f5f9', labels: { style: { color: '#64748b' } } },
        legend: { enabled: true, itemStyle: { color: '#94a3b8', fontSize: '10px' } },
        credits: { enabled: false },
        series: seriesData,
        plotOptions: { series: { marker: { enabled: false }, lineWidth: 1.5, states: { hover: { enabled: false } } } }
    });

    const charts = {
        acc: new Highcharts.Chart(createChartConfig('Acelerómetro (G)', [
            { name: 'X', color: '#ef4444', data: [] }, { name: 'Y', color: '#22c55e', data: [] }, { name: 'Z', color: '#3b82f6', data: [] }
        ])),
        gyro: new Highcharts.Chart(createChartConfig('Giroscopio (°/s)', [
            { name: 'X', color: '#f59e0b', data: [] }, { name: 'Y', color: '#8b5cf6', data: [] }, { name: 'Z', color: '#06b6d4', data: [] }
        ])),
        pca: new Highcharts.Chart(createChartConfig('Componente Principal (PCA)', [
            { name: 'Señal Proyectada', color: '#3b82f6', data: [], type: 'spline' }
        ])),
        fft: new Highcharts.Chart({
            ...createChartConfig('Análisis de Frecuencia (FFT)', [{ name: 'Densidad Espectral', color: '#16a34a', data: [], type: 'area' }]),
            xAxis: { labels: { style: { color: '#64748b' } }, title: { text: 'Hz', style: { color: '#64748b' } } }
        })
    };

    charts.acc.renderTo = 'c-acc';
    charts.gyro.renderTo = 'c-gyro';
    charts.pca.renderTo = 'c-pca';
    charts.fft.renderTo = 'c-fft';

    // --- Procesamiento de Señal ---
    function processIncoming(line) {
        try {
            const d = JSON.parse(line);
            const now = Date.now();
            
            // Guardar para gráficos en tiempo real
            rawData.ax.push(d.ax); rawData.ay.push(d.ay); rawData.az.push(d.az);
            rawData.gx.push(d.gx); rawData.gy.push(d.gy); rawData.gz.push(d.gz);
            rawData.t.push(now);

            // Si estamos grabando, guardar en la sesión actual
            if (isRecording) {
                recordedSession.push({
                    timestamp: new Date(now).toISOString(),
                    ax: d.ax, ay: d.ay, az: d.az,
                    gx: d.gx, gy: d.gy, gz: d.gz
                });
            }

            if (rawData.ax.length > MAX_DATA_POINTS) {
                Object.keys(rawData).forEach(k => rawData[k].shift());
            }

            const shift = charts.acc.series[0].data.length > MAX_DATA_POINTS;
            charts.acc.series[0].addPoint([now, d.ax], false, shift);
            charts.acc.series[1].addPoint([now, d.ay], false, shift);
            charts.acc.series[2].addPoint([now, d.az], true, shift);

            charts.gyro.series[0].addPoint([now, d.gx], false, shift);
            charts.gyro.series[1].addPoint([now, d.gy], false, shift);
            charts.gyro.series[2].addPoint([now, d.gz], true, shift);

        } catch (e) {
            // Ignorar errores de parseo de tramas incompletas
        }
    }

    // --- Funciones de Grabación ---
    function startRecording() {
        recordedSession = [];
        isRecording = true;
        document.getElementById('btn-record').disabled = true;
        document.getElementById('btn-record').classList.add('active');
        document.getElementById('btn-stop').disabled = false;
        log("Iniciada grabación de datos en crudo...", "warning");
    }

    function stopRecording() {
        isRecording = false;
        document.getElementById('btn-record').disabled = false;
        document.getElementById('btn-record').classList.remove('active');
        document.getElementById('btn-stop').disabled = true;
        
        if (recordedSession.length === 0) {
            log("No hay datos grabados para descargar.", "error");
            return;
        }

        log(`Grabación finalizada. Procesando ${recordedSession.length} muestras...`, "success");
        downloadCSV();
    }

    function downloadCSV() {
        const headers = ["Timestamp", "Accel_X", "Accel_Y", "Accel_Z", "Gyro_X", "Gyro_Y", "Gyro_Z"];
        const rows = recordedSession.map(s => [
            s.timestamp, s.ax, s.ay, s.az, s.gx, s.gy, s.gz
        ]);

        let csvContent = "data:text/csv;charset=utf-8," 
            + headers.join(",") + "\n"
            + rows.map(e => e.join(",")).join("\n");

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `captura_movimiento_${Date.now()}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        log("Archivo CSV generado y descargado.", "success");
    }

    // --- Loop de Análisis (PCA & FFT) cada 0.5s ---
    setInterval(() => {
        if (rawData.ax.length < 32) return;

        const n = rawData.ax.length;
        const matrix = [];
        const means = [0, 0, 0];

        // 1. Centrado de datos
        for(let i=0; i<n; i++) {
            means[0] += rawData.ax[i]/n; means[1] += rawData.ay[i]/n; means[2] += rawData.az[i]/n;
            matrix.push([rawData.ax[i], rawData.ay[i], rawData.az[i]]);
        }
        const centered = matrix.map(r => r.map((v, j) => v - means[j]));

        // 2. PCA (Power Iteration para obtener PC1)
        let ev = [1, 1, 1];
        for(let i=0; i<8; i++) {
            let next_ev = [0, 0, 0];
            for(let r=0; r<3; r++) {
                for(let c=0; c<3; c++) {
                    let cov_rc = 0;
                    centered.forEach(row => cov_rc += (row[r] * row[c]) / (n-1));
                    next_ev[r] += cov_rc * ev[c];
                }
            }
            const norm = Math.sqrt(next_ev.reduce((s, x) => s + x*x, 0));
            ev = next_ev.map(x => x / (norm || 1));
        }

        const projection = centered.map(r => r.reduce((s, v, j) => s + v * ev[j], 0));
        charts.pca.series[0].setData(projection.map((v, i) => [rawData.t[i], v]), true, false, false);
        document.getElementById('m-axis').innerText = `[${ev[0].toFixed(2)}, ${ev[1].toFixed(2)}, ${ev[2].toFixed(2)}]`;

        // 3. FFT sobre el eje dominante
        const fftLen = Math.pow(2, Math.floor(Math.log2(projection.length)));
        const signal = projection.slice(-fftLen);
        const spectrum = [];
        let maxP = 0, domF = 0;

        for (let k = 0; k < fftLen / 2; k++) {
            let re = 0, im = 0;
            for (let t = 0; t < fftLen; t++) {
                const angle = (2 * Math.PI * k * t) / fftLen;
                re += signal[t] * Math.cos(angle);
                im -= signal[t] * Math.sin(angle);
            }
            const mag = Math.sqrt(re*re + im*im);
            const freq = k * (FREQ_SAMPLING / fftLen);
            spectrum.push([freq, mag]);
            
            if (k > 1 && mag > maxP) { 
                maxP = mag; domF = freq;
            }
        }

        charts.fft.series[0].setData(spectrum, true);
        document.getElementById('m-hz').innerText = domF.toFixed(2) + " Hz";
        document.getElementById('m-pwr').innerText = maxP.toFixed(2);

    }, 500);

    // --- Conectividad ---
    async function connectUSB() {
        try {
            log("Solicitando acceso a puerto serie...");
            const port = await navigator.serial.requestPort();
            await port.open({ baudRate: 115200 });
            log("Puerto serie abierto a 115200 baudios", "success");
            
            const decoder = new TextDecoderStream();
            port.readable.pipeTo(decoder.writable);
            const reader = decoder.readable.getReader();
            let buf = "";

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                buf += value;
                const lines = buf.split("\n");
                buf = lines.pop();
                lines.forEach(processIncoming);
            }
        } catch (err) {
            log("Error de conexión USB: " + err.message, "error");
        }
    }

    async function connectBLE() {
        try {
            log("Escaneando dispositivos BLE...");
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: "ESP32" }],
                optionalServices: ["6e400001-b5a3-f393-e0a9-e50e24dcca9e"]
            });
            log(`Dispositivo encontrado: ${device.name}`, "info");
            const server = await device.gatt.connect();
            log("Conexión GATT establecida", "success");
            const service = await server.getPrimaryService("6e400001-b5a3-f393-e0a9-e50e24dcca9e");
            const tx = await service.getCharacteristic("6e400003-b5a3-f393-e0a9-e50e24dcca9e");
            
            await tx.startNotifications();
            tx.addEventListener('characteristicvaluechanged', (e) => {
                const text = new TextDecoder().decode(e.target.value);
                processIncoming(text);
            });
            log("Suscripción a notificaciones activa", "success");
        } catch (err) {
            log("Error BLE: " + err.message, "error");
        }
    }
</script>
</body>
</html>
